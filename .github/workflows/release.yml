name: Release

# Pushing a v* tag triggers a release build; after notarization the artifact is attached to GitHub Releases.
# Uses GitHub-hosted runner (macos-26). No self-hosted runner required.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create a release with the default GITHUB_TOKEN

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          fi
          xcodebuild -version

      # Import the Developer ID Application certificate (.p12) into a temporary keychain.
      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      # Set the app version to match the tag (e.g. v1.2 → 1.2) so the in-app
      # update check (CFBundleShortVersionString) works correctly.
      - name: Archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild archive \
            -project Voxt.xcodeproj \
            -scheme Voxt \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Voxt.xcarchive" \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=4GERXBURZN \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Voxt.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="$RUNNER_TEMP/export/Voxt.app"
          ZIP="$RUNNER_TEMP/notarize.zip"
          # Zip the app before submitting for notarization.
          ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          # Staple the notarization ticket to the .app and repack for distribution.
          xcrun stapler staple "$APP"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Voxt.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RUNNER_TEMP/Voxt.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
